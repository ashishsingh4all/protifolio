<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive 3D Parallax Website</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="Parallax.css" />
  </head>

  <body>
    <div class="loading-screen">
      <div class="loader"></div>
    </div>
    <main>
      <div class="vignette hide"></div>
      
      <!-- Parallax Layers -->
      <img src="img/background.png" data-speedx="0.3" data-speedy="0.38" data-speedz="0" data-rotation="0" data-distance="-200" alt="Background" class="parallax bg-img" />
      <img src="img/fog_7.png" data-speedx="0.27" data-speedy="0.32" data-speedz="0" data-rotation="0" data-distance="850" alt="Fog" class="parallax fog-7" />
      <!-- <img src="img/mountain_10.png" data-speedx="0.195" data-speedy="0.305" data-speedz="0" data-rotation="0" data-distance="1100" alt="Mountain" class="parallax mountain-10" /> -->
      <img src="img/fog_6.png" data-speedx="0.25" data-speedy="0.28" data-speedz="0" data-rotation="0" data-distance="1400" alt="Fog" class="parallax fog-6" />
      <img src="img/mountain_9.png" data-speedx="0.125" data-speedy="0.155" data-speedz="0.15" data-rotation="0.02" data-distance="1700" alt="Mountain" class="parallax mountain-9" />
      <img src="img/mountain_8.png" data-speedx="0.1" data-speedy="0.11" data-speedz="0" data-rotation="0.02" data-distance="1800" alt="Mountain" class="parallax mountain-8" />
      <img src="img/fog_5.png" data-speedx="0.16" data-speedy="0.105" data-speedz="0" data-rotation="0" data-distance="1900" alt="Fog" class="parallax fog-5">
      <img src="img/mountain_7.png" data-speedx="0.1" data-speedy="0.1" data-speedz="0" data-rotation="0.07" data-distance="2000" alt="Mountain" class="parallax mountain-7" />
      
      <div class="text parallax" data-speedx="0.07" data-speedy="0.07" data-speedz="0" data-rotation="0.11">
        <h2 class="text-reveal">Parallax by</h2>
        <h1 class="text-reveal">Ashish</h1>
        <p class="scroll-indicator">Scroll to explore <i class="fa-solid fa-arrow-down"></i></p>
      </div>
      
      <img src="img/mountain_6.png" data-speedx="0.065" data-speedy="0.05" data-speedz="0.05" data-rotation="0.12" data-distance="2300" alt="Mountain" class="parallax mountain-6" />
      <img src="img/fog_4.png" data-speedx="0.135" data-speedy="0.38" data-speedz="0" data-rotation="0" data-distance="2400" alt="Fog" class="parallax fog-4" />
      <img src="img/mountain_5.png" data-speedx="0.08" data-speedy="0.08" data-speedz="0.13" data-rotation="0.1" data-distance="2550" alt="Mountain" class="parallax mountain-5" />
      <img src="img/fog_3.png" data-speedx="0.11" data-speedy="0.018" data-speedz="0" data-rotation="0" data-distance="2800" alt="Fog" class="parallax fog-3" />
      <img src="img/mountain_4.png" data-speedx="0.059" data-speedy="0.024" data-speedz="0.35" data-rotation="0.14" data-distance="3200" alt="Mountain" class="parallax mountain-4" />
      <img src="img/mountain_3.png" data-speedx="0.04" data-speedy="0.018" data-speedz="0.32" data-rotation="0.05" data-distance="3400" alt="Mountain" class="parallax mountain-3" />
      <img src="img/fog_2.png" data-speedx="0.15" data-speedy="0.0115" data-speedz="0" data-rotation="0" data-distance="3600" alt="Fog" class="parallax fog-2" />
      <img src="img/mountain_2.png" data-speedx="0.0235" data-speedy="0.013" data-speedz="0.42" data-rotation="0.15" data-distance="3800" alt="Mountain" class="parallax mountain-2" />
      <img src="img/mountain_1.png" data-speedx="0.027" data-speedy="0.018" data-speedz="0.53" data-rotation="0.2" data-distance="4000" alt="Mountain" class="parallax mountain-1" />
      <img src="img/sun_rays.png" alt="Sun Rays" class="sun-rays hide" >
      <img src="img/black_shadow.png" alt="Shadow" class="black-shadow hide" />
      <img src="img/fog_1.png" data-speedx="0.12" data-speedy="0.01" data-speedz="0" data-rotation="0" data-distance="4200" alt="Fog" class="parallax fog-1" />
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="Parallax.js" defer></script>
  </body>
</html>
